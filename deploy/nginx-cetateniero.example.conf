# Nginx pentru cetateniero.md — proiect: /home/john/acteromania, PHP 8.3
# Instalare:
#   sudo cp deploy/nginx-cetateniero.example.conf /etc/nginx/sites-available/cetateniero.md
#   sudo ln -sf /etc/nginx/sites-available/cetateniero.md /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# HTTPS: sudo certbot --nginx -d cetateniero.md -d www.cetateniero.md
#
# Dacă Nginx raportează 403: user www-data trebuie să poată traversa /home/john:
#   chmod o+x /home/john
#   chmod o+x /home/john/acteromania
# (sau mută proiectul în /var/www/acteromania)

server {
    listen 80;
    listen [::]:80;
    server_name cetateniero.md www.cetateniero.md;

    root /home/john/acteromania;
    index index.php index.html;

    client_max_body_size 64M;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        # Evită 502 la cereri mai lungi (sesiune + DB la schimbare ?lang=)
        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|mp4|webm|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
